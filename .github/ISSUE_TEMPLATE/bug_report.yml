name: Bug Report
description: Report a problem with Kable.
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Kable version

  - type: input
    id: os
    attributes:
      label: Operating system